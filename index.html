function delFoodItem(btn, mealId, dishIdx) {
  const did = mealId + '-dish-' + dishIdx;
  const container = document.getElementById(did + '-items');
  const rows = container.querySelectorAll('.food-item-row');
  if (rows.length <= 1) {
    btn.closest('.food-item-row').querySelectorAll('input').forEach(function(i) { i.value = ''; });
  } else {
    btn.closest('.food-item-row').remove();
  }
  updateSaveBtnTotal(mealId);
}

function updateSaveBtnTotal(mealId) {
  let tc=0, tp=0, tf=0;
  const dishCards = document.querySelectorAll('#' + mealId + '-dishes .dish-card');
  dishCards.forEach(function(card) {
    getDishItems(card).forEach(function(i) {
      tc += parseFloat(i.carb) || 0;
      tp += parseFloat(i.pro)  || 0;
      tf += parseFloat(i.fat)  || 0;
    });
  });
  const btn = document.querySelector('#' + mealId + '-card .btn-save');
  if (btn && (tc || tp || tf)) {
    btn.textContent = '儲存這餐（碳' + Math.round(tc) + ' 蛋' + Math.round(tp) + ' 脂' + Math.round(tf) + 'g）';
  } else if (btn) {
    btn.textContent = '儲存這餐';
  }
  // Also refresh the top summary so it reflects live typing (updateSummary
  // now prefers DOM values over model for visible meal cards).
  updateSummary();
}

function updateBadge(mealId) {
  const meal = getMeal(mealId);
  const has = hasMealData(meal);
  const badge = document.getElementById(mealId + '-badge');
  const card  = document.getElementById(mealId + '-card');
  if (badge) { badge.textContent = has ? '已記錄' : '未記錄'; badge.className = 'meal-badge' + (has ? ' done' : ''); }
  if (card)  { card.classList.toggle('has-data', has); }
}

// ─── N1: Streak pill ─────────────────────────────────────────────
function hasAnyDataForDay(member, d) {
  var key = member + '::' + d.toISOString().slice(0,10);
  var day = localData[key];
  if (!day) return false;
  for (var i = 0; i < MEALS_DEF.length; i++) {
    if (hasMealData(day[MEALS_DEF[i].id])) return true;
  }
  return false;
}

function computeStreak(member) {
  if (!member) return 0;
  var cursor = new Date();
  cursor.setHours(12, 0, 0, 0);
  // If today has no data, start counting from yesterday (don't shame users
  // who haven't eaten their first meal yet).
  if (!hasAnyDataForDay(member, cursor)) {
    cursor.setDate(cursor.getDate() - 1);
  }
  var count = 0;
  for (var i = 0; i < 400; i++) {
    if (!hasAnyDataForDay(member, cursor)) break;
    count++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return count;
}

function updateStreakPill() {
  var pill = document.getElementById('streak-pill');
  if (!pill) return;
  if (!currentMember) { pill.style.display = 'none'; return; }
  var n = computeStreak(currentMember);
  if (n <= 0) { pill.style.display = 'none'; return; }
  // Badge tier by streak length — encourage escalation without pressuring.
  var emoji = n >= 30 ? '🏆' : (n >= 14 ? '💪' : (n >= 7 ? '🔥' : '✨'));
  pill.className = 'streak-pill' + (n >= 14 ? ' hot' : '');
  pill.textContent = emoji + ' ' + n + ' 天';
  pill.style.display = '';
}

function updateSummary() {
  const k = dateKey();
  let tc = 0, tp = 0, tf = 0;
  MEALS_DEF.forEach(function(m) {
    // Prefer live DOM values for currently-rendered meals so the summary
    // reflects what the user is typing right now (before any save/harvest).
    // Fall back to persisted model for meals not currently in the DOM.
    const dishCards = document.querySelectorAll('#' + m.id + '-dishes .dish-card');
    if (dishCards.length > 0) {
      dishCards.forEach(function(card) {
        card.querySelectorAll('.food-item-row').forEach(function(row) {
          const c = row.querySelector('.fi-carb');
          const p = row.querySelector('.fi-pro');
          const f = row.querySelector('.fi-fat');
          tc += (c ? parseFloat(c.value) : 0) || 0;
          tp += (p ? parseFloat(p.value) : 0) || 0;
          tf += (f ? parseFloat(f.value) : 0) || 0;
        });
      });
      return;
    }
    const meal = (localData[k] || {})[m.id];
    if (!meal) return;
    const t = computeMealTotals(meal);
    tc += t.carb; tp += t.pro; tf += t.fat;
  });
  document.getElementById('s-carb').textContent = Math.round(tc);
  document.getElementById('s-pro').textContent  = Math.round(tp);
  document.getElementById('s-fat').textContent  = Math.round(tf);
  const total = tc + tp + tf;
  const pc = total ? Math.round(tc / total * 100) : 0;
  const pp = total ? Math.round(tp / total * 100) : 0;
  const pf = total ? 100 - pc - pp : 0;
  document.getElementById('rb-carb').style.width = pc + '%';
  document.getElementById('rb-pro').style.width  = pp + '%';
  document.getElementById('rb-fat').style.width  = pf + '%';
  document.getElementById('pct-carb').textContent = pc + '%';
  document.getElementById('pct-pro').textContent  = pp + '%';
  document.getElementById('pct-fat').textContent  = pf + '%';
}

// ─── GOOGLE DRIVE ────────────────────────────────────────────────
async function ensurePhotoFolder(parentId, dateStr) {
  const folderName = 'photos_' + dateStr;
  const search = await fetch(
    'https://www.googleapis.com/drive/v3/files?q=name=\'' + folderName + '\' and \'' + parentId + '\' in parents and mimeType=\'application/vnd.google-apps.folder\' and trashed=false&fields=files(id)',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  const sd = await search.json();
  if (sd.files && sd.files.length > 0) return sd.files[0].id;
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: folderName, parents: [parentId], mimeType: 'application/vnd.google-apps.folder' })
  });
  const cd = await create.json();
  return cd.id;
}

async function ensureFolder() {
  if (driveFolderId) return driveFolderId;
  const search = await fetch(
    'https://www.googleapis.com/drive/v3/files?q=name=\'' + FOLDER_NAME + '\' and mimeType=\'application/vnd.google-apps.folder\' and trashed=false&fields=files(id)',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  const sd = await search.json();
  if (sd.files && sd.files.length > 0) {
    driveFolderId = sd.files[0].id;
    localStorage.setItem('driveFolderId', driveFolderId);
    return driveFolderId;
  }
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const cd = await create.json();
  driveFolderId = cd.id;
  localStorage.setItem('driveFolderId', driveFolderId);
  return driveFolderId;
}

async function uploadJSON(folderId, filename, data) {
  const content = JSON.stringify(data, null, 2);
  const search = await fetch(
    'https://www.googleapis.com/drive/v3/files?q=name=\'' + filename + '\' and \'' + folderId + '\' in parents and trashed=false&fields=files(id)',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  const sd = await search.json();
  const blob = new Blob([content], { type: 'application/json' });

  if (sd.files && sd.files.length > 0) {
    const fileId = sd.files[0].id;
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media', {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: content
    });
    if (!res.ok) throw new Error('Update failed: ' + res.status + ' ' + await res.text());
  } else {
    const meta = { name: filename, parents: [folderId] };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form
    });
    if (!res.ok) throw new Error('Create failed: ' + res.status + ' ' + await res.text());
  }
}

async function uploadPhoto(folderId, filename, dataUrl) {
  const base64 = dataUrl.split(',')[1];
  const mimeType = dataUrl.split(';')[0].split(':')[1];
  const byteChars = atob(base64);
  const byteArr = new Uint8Array(byteChars.length);
  for (let i=0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
  const blob = new Blob([byteArr], { type: mimeType });
  const meta = { name: filename, parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
  form.append('file', blob);
  await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST', headers: { Authorization: 'Bearer ' + accessToken }, body: form
  });
}

// Per-meal merge: remote and local both have a member::date::mealId entry.
// Rule: whichever side has MORE dishes wins. This is good enough for the
// family-sync case where different members edit different dates/meals — real
// conflicts are extremely rare. Caveat: a delete that drops dishCount from
// N→0 will be reverted by a stale local copy; users can work around by
// editing the dish to blank instead of deleting.
function mergeRemoteProfiles(remoteProfiles) {
  if (!remoteProfiles || typeof remoteProfiles !== 'object') return;
  Object.keys(remoteProfiles).forEach(function(member) {
    var r = remoteProfiles[member];
    if (!r || typeof r !== 'object') return;
    var l = localProfiles[member];
    // Newer updatedAt wins; if one side lacks a timestamp, the side with
    // one is treated as newer.
    if (!l) { localProfiles[member] = r; return; }
    var rTime = r.updatedAt || '';
    var lTime = l.updatedAt || '';
    if (rTime > lTime) localProfiles[member] = r;
  });
  try { localStorage.setItem('profiles', JSON.stringify(localProfiles)); } catch(_) {}
}

function mergeRemoteTemplates(remoteTemplates) {
  if (!remoteTemplates || typeof remoteTemplates !== 'object') return;
  Object.keys(remoteTemplates).forEach(function(id) {
    var r = remoteTemplates[id];
    if (!r || typeof r !== 'object') return;
    var l = localTemplates[id];
    if (!l) { localTemplates[id] = r; return; }
    var rTime = r.createdAt || '';
    var lTime = l.createdAt || '';
    if (rTime > lTime) localTemplates[id] = r;
  });
  try { localStorage.setItem('templates', JSON.stringify(localTemplates)); } catch(_) {}
}

function mergeRemoteLibrary(remoteLibrary) {
  if (!remoteLibrary || typeof remoteLibrary !== 'object') return;
  Object.keys(remoteLibrary).forEach(function(id) {
    var r = remoteLibrary[id];
    if (!r || typeof r !== 'object') return;
    var l = localLibrary[id];
    if (!l) { localLibrary[id] = r; return; }
    var rTime = r.createdAt || '';
    var lTime = l.createdAt || '';
    if (rTime > lTime) localLibrary[id] = r;
  });
  try { localStorage.setItem('library', JSON.stringify(localLibrary)); } catch(_) {}
}

function mergeRemoteIntoLocal(remote) {
  if (!remote || typeof remote !== 'object') return localData;
  const result = {};
  Object.keys(localData).forEach(function(k) { result[k] = localData[k]; });
  Object.keys(remote).forEach(function(k) {
    // Skip non-date keys (e.g. "profiles") — they're handled separately.
    if (k.indexOf('::') === -1) return;
    if (!result[k]) { result[k] = remote[k]; return; }
    // Both sides have this date-key — merge meal by meal.
    const merged = {};
    Object.keys(result[k]).forEach(function(mealId) { merged[mealId] = result[k][mealId]; });
    Object.keys(remote[k] || {}).forEach(function(mealId) {
      const localM = merged[mealId];
      const remoteM = remote[k][mealId];
      if (!localM) { merged[mealId] = remoteM; return; }
      const localHas  = typeof hasMealData === 'function' ? hasMealData(localM)  : true;
      const remoteHas = typeof hasMealData === 'function' ? hasMealData(remoteM) : true;
      if (!localHas)  { merged[mealId] = remoteM; return; }
      if (!remoteHas) return; // keep local
      const localCount  = ((localM  && localM.dishes)  || []).length;
      const remoteCount = ((remoteM && remoteM.dishes) || []).length;
      if (remoteCount > localCount) merged[mealId] = remoteM;
    });
    result[k] = merged;
  });
  return result;
}

async function fetchSharedFile() {
  const r = await fetch(
    'https://www.googleapis.com/drive/v3/files/' + SHARED_DATA_FILE_ID + '?alt=media',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  if (!r.ok) {
    if (r.status === 401 || r.status === 403) {
      toast('需要重新登入以取得家庭共享資料夾權限');
      signOut();
      return null;
    }
    throw new Error('Drive fetch failed: ' + r.status);
  }
  return await r.json();
}

async function loadFromDrive() {
  if (!accessToken) return;
  try {
    let driveData = null;
    if (SHARED_DATA_FILE_ID) {
      // Shared mode — read the family file directly by ID.
      driveData = await fetchSharedFile();
      if (driveData === null) return; // signOut was called, bail
    } else {
      // Legacy per-user mode — search the user's own FamilyMealTracker folder.
      const fid = await ensureFolder();
      const search = await fetch(
        'https://www.googleapis.com/drive/v3/files?q=name=\'meal_data.json\' and \'' + fid + '\' in parents and trashed=false&fields=files(id)',
        { headers: { Authorization: 'Bearer ' + accessToken } }
      );
      const sd = await search.json();
      if (!sd.files || sd.files.length === 0) return;
      const fileId = sd.files[0].id;
      const r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      driveData = await r.json();
    }
    if (driveData && typeof driveData === 'object' && !Array.isArray(driveData)) {
      // Profiles are synced separately so they don't pollute the date-keyed map.
      if (driveData.profiles)  mergeRemoteProfiles(driveData.profiles);
      if (driveData.templates) mergeRemoteTemplates(driveData.templates);
      if (driveData.library)   mergeRemoteLibrary(driveData.library);
      localData = mergeRemoteIntoLocal(driveData);
      try { localStorage.setItem('mealData', JSON.stringify(localData)); } catch(_) {}
      render();
      setSyncOK('已從 Drive 載入資料');
    }
  } catch(e) { console.warn('Drive load:', e); }
}

function stripPhotosForUpload(data) {
  const noPhoto = {};
  Object.keys(data || {}).forEach(function(k) {
    // Non-date keys (e.g. "profiles") are passed through untouched.
    if (k.indexOf('::') === -1) {
      noPhoto[k] = data[k];
      return;
    }
    noPhoto[k] = {};
    Object.keys(data[k] || {}).forEach(function(mealId) {
      const m = data[k][mealId];
      noPhoto[k][mealId] = Object.assign({}, m, {
        dishes: ((m && m.dishes) || []).map(function(d) {
          return Object.assign({}, d, { photo: '' });
        })
      });
    });
  });
  return noPhoto;
}

async function syncToDrive() {
  if (!accessToken) { toast('請先登入'); return; }
  closeMenu();
  setSyncPending();
  toast('同步中...');
  // Visual button feedback: every clickable sync entry point (footer button
  // + the "☁️ 立即同步" menu item) gets a loading label so the user sees
  // that their tap triggered something even before the network finishes.
  const syncBtns = document.querySelectorAll('.btn-sync');
  const originalSyncTexts = [];
  syncBtns.forEach(function(b, i) {
    originalSyncTexts[i] = b.textContent;
    b.classList.add('loading');
    b.textContent = '同步中...';
  });
  try {
    if (SHARED_DATA_FILE_ID) {
      // 1) Re-read remote so we don't clobber another family member's recent edit.
      try {
        const remote = await fetchSharedFile();
        if (remote === null) return; // signOut was called
        if (remote && typeof remote === 'object' && !Array.isArray(remote)) {
          if (remote.profiles)  mergeRemoteProfiles(remote.profiles);
          if (remote.templates) mergeRemoteTemplates(remote.templates);
          if (remote.library)   mergeRemoteLibrary(remote.library);
          localData = mergeRemoteIntoLocal(remote);
          try { localStorage.setItem('mealData', JSON.stringify(localData)); } catch(_) {}
        }
      } catch(e) { console.warn('Pre-sync merge failed, continuing:', e); }

      // 2) Build photo-stripped payload from the merged localData.
      const payload = stripPhotosForUpload(localData);
      // Attach cross-device profile map, meal templates, and the family
      // dish library as sibling top-level fields. Non-date keys are
      // skipped in merge/strip paths so they ride along untouched.
      payload.profiles  = localProfiles;
      payload.templates = localTemplates;
      payload.library   = localLibrary;

      // 3) PATCH the shared file by ID (overwrite with merged content).
      const res = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files/' + SHARED_DATA_FILE_ID + '?uploadType=media',
        {
          method: 'PATCH',
          headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload, null, 2)
        }
      );
      if (!res.ok) throw new Error('Shared sync failed: ' + res.status + ' ' + await res.text());
      render();
    } else {
      // Legacy per-user mode
      const fid = await ensureFolder();
      const payload = stripPhotosForUpload(localData);
      await uploadJSON(fid, 'meal_data.json', payload);
    }

    const now = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
    setSyncOK('已同步 ' + now);
    toast('同步完成！');
  } catch(e) {
    console.warn('Sync error:', e);
    setSyncErr('同步失敗');
    toast('同步失敗，請重試');
  } finally {
    syncBtns.forEach(function(b, i) {
      b.classList.remove('loading');
      b.textContent = originalSyncTexts[i];
    });
  }
}

// ─── N3: PDF health report ───────────────────────────────────────
// Renders a 30-day summary for the current member as HTML, then uses
// html2canvas + jsPDF to rasterize it into a PDF. Raster-in-PDF means we
// don't need to embed a Chinese TTF font (~3MB) — the canvas captures
// the Noto Sans TC text we already loaded from Google Fonts.
function loadScriptOnce(url) {
  return new Promise(function(resolve, reject) {
    var existing = document.querySelector('script[data-url="' + url + '"]');
    if (existing && existing.dataset.loaded === 'true') return resolve();
    if (existing) {
      existing.addEventListener('load', resolve);
      existing.addEventListener('error', reject);
      return;
    }
    var s = document.createElement('script');
    s.src = url;
    s.async = true;
    s.dataset.url = url;
    s.onload  = function() { s.dataset.loaded = 'true'; resolve(); };
    s.onerror = function() { reject(new Error('Failed to load ' + url)); };
    document.head.appendChild(s);
  });
}

function buildPdfReportHtml(member) {
  var profile = localProfiles[member]
             || safeParse('profile::' + member, {}, '個人資料')
             || {};
  var tdeeInfo = computeTdee(profile);
  // Collect the last 30 days of totals
  var days = [];
  for (var i = 29; i >= 0; i--) {
    var d = new Date();
    d.setHours(12, 0, 0, 0);
    d.setDate(d.getDate() - i);
    var key = member + '::' + d.toISOString().slice(0,10);
    var dayData = localData[key] || {};
    var carb = 0, pro = 0, fat = 0;
    Object.keys(dayData).forEach(function(mealId) {
      var t = computeMealTotals(dayData[mealId]);
      carb += t.carb; pro += t.pro; fat += t.fat;
    });
    var kcal = Math.round(carb * 4 + pro * 4 + fat * 9);
    days.push({
      date: (d.getMonth() + 1) + '/' + d.getDate(),
      weekday: '日一二三四五六'.charAt(d.getDay()),
      carb: Math.round(carb), pro: Math.round(pro), fat: Math.round(fat),
      kcal: kcal
    });
  }
  var loggedDays = days.filter(function(d) { return d.kcal > 0; }).length;
  var totalKcal = days.reduce(function(s, d) { return s + d.kcal; }, 0);
  var avgKcal = loggedDays > 0 ? Math.round(totalKcal / loggedDays) : 0;
  var totalCarb = days.reduce(function(s, d) { return s + d.carb; }, 0);
  var totalPro  = days.reduce(function(s, d) { return s + d.pro;  }, 0);
  var totalFat  = days.reduce(function(s, d) { return s + d.fat;  }, 0);
  var avgCarb = loggedDays > 0 ? Math.round(totalCarb / loggedDays) : 0;
  var avgPro  = loggedDays > 0 ? Math.round(totalPro  / loggedDays) : 0;
  var avgFat  = loggedDays > 0 ? Math.round(totalFat  / loggedDays) : 0;

  var now = new Date();
  var start = new Date(); start.setDate(start.getDate() - 29);
  var header = '<h1 style="margin:0 0 6px 0;font-size:22px;color:#1D9E75;">家庭飲食記錄</h1>'
    + '<h2 style="margin:0 0 20px 0;font-size:16px;color:#333;font-weight:500;">30 日健康報告</h2>'
    + '<table style="width:100%;border-collapse:collapse;margin-bottom:18px;font-size:13px;">'
    + '<tr><td style="padding:3px 0;width:90px;color:#666;">成員</td><td style="padding:3px 0;font-weight:600;">' + escAttr(member || '—') + '</td></tr>'
    + '<tr><td style="padding:3px 0;color:#666;">期間</td><td style="padding:3px 0;">' + (start.getMonth()+1) + '/' + start.getDate() + '  –  ' + (now.getMonth()+1) + '/' + now.getDate() + '</td></tr>'
    + '<tr><td style="padding:3px 0;color:#666;">產出日期</td><td style="padding:3px 0;">' + now.toISOString().slice(0,10) + '</td></tr>'
    + '</table>';

  var profileBlock = '';

    profileBlock = '<div style="background:#f8f8f6;border-left:4px solid #1D9E75;padding:12px 16px;margin-bottom:18px;">'
      + '<div style="font-weight:600;margin-bottom:8px;font-size:14px;">個人資料</div>'
      + '<table style="width:100%;font-size:13px;">'
      + '<tr><td style="padding:2px 12px 2px 0;color:#666;">身高</td><td style="padding:2px 0;">' + (profile.height ? profile.height + ' cm' : '—') + '</td>'
      + '<td style="padding:2px 12px 2px 24px;color:#666;">體重</td><td style="padding:2px 0;">' + (profile.weight ? profile.weight + ' kg' : '—') + '</td></tr>';
    if (profile.height && profile.weight) {
      var bmi = profile.weight / ((profile.height/100) * (profile.height/100));
      profileBlock += '<tr><td style="padding:2px 12px 2px 0;color:#666;">BMI</td><td style="padding:2px 0;">' + bmi.toFixed(1) + '</td>';
      if (tdeeInfo) {
        profileBlock += '<td style="padding:2px 12px 2px 24px;color:#666;">每日目標</td><td style="padding:2px 0;font-weight:600;color:#5B21B6;">' + tdeeInfo.tdee + ' 大卡</td>';
      }
      profileBlock += '</tr>';
    }
    profileBlock += '</table></div>';
  }

  var statsBlock = '<div style="background:#e1f5ee;padding:14px 16px;border-radius:8px;margin-bottom:18px;">'
    + '<div style="font-weight:600;margin-bottom:10px;font-size:14px;">30 日整體統計</div>'
    + '<table style="width:100%;font-size:13px;">'
    + '<tr><td style="padding:3px 0;color:#666;">已記錄天數</td><td style="padding:3px 0;font-weight:600;">' + loggedDays + ' / 30 天</td></tr>'
    + '<tr><td style="padding:3px 0;color:#666;">平均每日熱量</td><td style="padding:3px 0;font-weight:600;color:#8B5CF6;">' + avgKcal + ' 大卡</td></tr>'
    + '<tr><td style="padding:3px 0;color:#666;">平均碳水 / 蛋白 / 脂肪</td><td style="padding:3px 0;">' + avgCarb + ' g / ' + avgPro + ' g / ' + avgFat + ' g</td></tr>'
    + '</table></div>';

  var tableRows = days.map(function(d) {

  var footer = '<div style="margin-top:24px;padding-top:12px;border-top:1px solid #e0ded6;font-size:11px;color:#9a9890;">由「家庭飲食記錄」PWA 產生 · 可攜至診所/醫院作為飲食參考</div>';

  return header + profileBlock + statsBlock + table + footer;
}

async function exportPDF() {
  closeMenu();
  var member = currentMember;
  if (!member) { toast('沒有成員資料'); return; }
  toast('產生報告中，請稍候...');
  try {
    // Load jsPDF + html2canvas on demand (no bundle weight until used)
    await loadScriptOnce('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');
    await loadScriptOnce('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
    if (!window.html2canvas || !window.jspdf) throw new Error('PDF library load failed');

    // Build a hidden, fixed-width div so the canvas rasterizes at a
    // predictable scale regardless of device viewport.
    var div = document.createElement('div');
    div.style.cssText = 'position:fixed;top:-9999px;left:0;width:620px;padding:32px;background:#fff;'
      + 'font-family:"Noto Sans TC",sans-serif;color:#1c1c1a;font-size:13px;line-height:1.5;';
    div.innerHTML = buildPdfReportHtml(member);
    document.body.appendChild(div);

    try {
      var canvas = await window.html2canvas(div, { scale: 2, backgroundColor: '#fff', useCORS: true });
      var imgData = canvas.toDataURL('image/png');
      var pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
      var pageW = pdf.internal.pageSize.getWidth();
      var pageH = pdf.internal.pageSize.getHeight();
      var imgW  = pageW - 40; // 20pt margin each side
      var imgH  = (canvas.height / canvas.width) * imgW;
      // Multi-page: slice the image into page-high chunks.
      if (imgH <= pageH - 40) {
        pdf.addImage(imgData, 'PNG', 20, 20, imgW, imgH);
      } else {
        var pos = 0;
        var chunkPagePt = pageH - 40;
        while (pos < imgH) {
          pdf.addImage(imgData, 'PNG', 20, 20 - pos, imgW, imgH);
          pos += chunkPagePt;
          if (pos < imgH) pdf.addPage();
        }
      }
      var fname = '家庭飲食_' + member + '_' + new Date().toISOString().slice(0, 10) + '.pdf';
      pdf.save(fname);
      toast('PDF 已下載 ✓');
    } finally {
      document.body.removeChild(div);
    }
  } catch (e) {
    console.error('PDF export error:', e);
    toast('PDF 產生失敗：' + (e.message || e));
  }
}

// ─── M6: floating save button above the mobile keyboard ─────────
// When an input inside any meal body is focused, show a full-width
// "儲存 XX" button glued just above the keyboard (via visualViewport).
// This prevents the classic PWA pain where the keyboard hides the real
// save button and users tap the wrong thing.
function initKeyboardFloat() {
  if (typeof window === 'undefined' || !window.visualViewport) return;
  var float = document.createElement('button');
  float.className = 'floating-save';
  float.type = 'button';
  document.body.appendChild(float);

  var activeMealId = null;
  var hideTimer = null;

  function positionFloat() {
    if (!activeMealId) return;
    var vv = window.visualViewport;
    // Distance from bottom of layout viewport to bottom of visual viewport.
    // When keyboard is up this is the keyboard height.
    var gap = window.innerHeight - (vv.height + vv.offsetTop);
    float.style.bottom = Math.max(8, gap + 8) + 'px';
  }

  function showFor(mealId) {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    activeMealId = mealId;
    float.textContent = '✓ 儲存' + mealNameById(mealId);
    float.onclick = function(e) {
      e.preventDefault();
      // Blur the input first so the keyboard closes before save triggers
      // a re-render (otherwise the DOM for the button changes mid-click).
      if (document.activeElement && document.activeElement.blur) {
        document.activeElement.blur();
      }
      saveMeal(mealId);
    };
    float.style.display = 'block';
    positionFloat();
  }

  function hide() {
    activeMealId = null;
    float.style.display = 'none';
  }

  document.addEventListener('focusin', function(e) {
    var target = e.target;
    if (!target || !target.closest) return;
    var body = target.closest('.meal-body');
    if (!body) return;
    var card = target.closest('.meal-card');
    if (!card || !card.id) return;
    var mealId = card.id.replace('-card', '');
    showFor(mealId);
  });

  document.addEventListener('focusout', function() {
    // Delay so rapid focus-switches between inputs don't flicker the button.
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      var active = document.activeElement;
      if (!active || !active.closest || !active.closest('.meal-body')) hide();
    }, 120);
  });

  window.visualViewport.addEventListener('resize', positionFloat);
  window.visualViewport.addEventListener('scroll', positionFloat);
}

// ─── BMR / TDEE (Mifflin-St Jeor) ────────────────────────────────
// BMR_male   = 10*w + 6.25*h - 5*age + 5
// BMR_female = 10*w + 6.25*h - 5*age - 161
// TDEE       = BMR * activity_multiplier
function computeTdee(p) {
  if (!p) return null;
  var h = parseFloat(p.height), w = parseFloat(p.weight);
  var by = parseInt(p.birthYear, 10);
  var gender = p.gender;
  var act = parseFloat(p.activity) || 1.375;
  if (!h || !w || !by || !gender) return null;
  var age = new Date().getFullYear() - by;
  if (age < 1 || age > 120) return null;
  var bmr = 10 * w + 6.25 * h - 5 * age;
  bmr += (gender === 'male') ? 5 : -161;
  var tdee = bmr * act;
  return { bmr: Math.round(bmr), tdee: Math.round(tdee), age: age, activity: act };
}

function readProfileFromForm() {
  return {
    height: parseFloat(document.getElementById('profile-height').value) || null,
    weight: parseFloat(document.getElementById('profile-weight').value) || null,
    gender: document.getElementById('profile-gender').value || null,
    birthYear: parseInt(document.getElementById('profile-birth').value, 10) || null,
    activity: parseFloat(document.getElementById('profile-activity').value) || 1.375
  };
}

function updateProfileCalc() {
  var p = readProfileFromForm();

  // BMI
  var bmiEl = document.getElementById('profile-bmi-value');
  var catEl = document.getElementById('profile-bmi-cat');
  if (!p.height || !p.weight) {
    bmiEl.textContent = '–';
    catEl.textContent = '請填寫身高體重';
    catEl.className = 'profile-bmi-cat';
  } else {
    var bmi = p.weight / ((p.height / 100) * (p.height / 100));
    bmiEl.textContent = bmi.toFixed(1);
    var cat, cls;
    if (bmi < 18.5)    { cat = '體重過輕'; cls = 'bmi-cat-low'; }
    else if (bmi < 24) { cat = '健康體位'; cls = 'bmi-cat-normal'; }
    else if (bmi < 27) { cat = '體重過重'; cls = 'bmi-cat-over'; }
    else               { cat = '肥胖';     cls = 'bmi-cat-obese'; }
    catEl.textContent = cat;
    catEl.className = 'profile-bmi-cat ' + cls;
  }

  // TDEE
  var tdeeValEl = document.getElementById('profile-tdee-value');
  var tdeeSubEl = document.getElementById('profile-tdee-sub');
  var t = computeTdee(p);
  if (t) {
    tdeeValEl.textContent = t.tdee;
    tdeeValEl.classList.remove('empty');
    tdeeSubEl.textContent = '基礎代謝 ' + t.bmr + ' 大卡 × 活動係數 ' + t.activity.toFixed(2) + '（' + t.age + '歲）';
  } else {
    tdeeValEl.textContent = '–';
    tdeeValEl.classList.add('empty');
    tdeeSubEl.textContent = '需填寫身高/體重/性別/出生年';
  }
}

function saveProfile() {
  var p = readProfileFromForm();

  if (p.height && (p.height < 50 || p.height > 250)) { toast('身高請填寫 50–250 cm');  return; }
  if (p.weight && (p.weight < 20 || p.weight > 300)) { toast('體重請填寫 20–300 kg');  return; }
  if (p.birthYear && (p.birthYear < 1900 || p.birthYear > new Date().getFullYear())) {
    toast('出生年請填寫合理年份'); return;
  }
  p.updatedAt = new Date().toISOString();
  try {
    // Legacy key kept in sync for offline fallback + reads that predate the
    // cross-device map.
    localStorage.setItem(profileKey(), JSON.stringify(p));
    // Cross-device map — picked up by syncToDrive() and pushed into the
    // shared file so other devices logged in as the same member will read it.
    localProfiles[currentMember] = p;
    localStorage.setItem('profiles', JSON.stringify(localProfiles));
    setSyncPending(); // tell the sync bar there are new changes to push
    toast('個人資料已儲存 ✓');
  } catch(_) {
    toast('儲存失敗：空間不足');
  }
}

function renderStatsView() {
  // Member chips — use DOM construction with index-based handler to avoid
  // injecting the (potentially user-controlled, drive-synced) member name
  // into an onclick attribute or HTML text.
  // A mapped user only sees their own member chip (+ Ning if authorized).
  // Dev / unmapped users fall back to the full list minus Ning-when-denied.
  var visibleMembers = visibleMembersForStats();
  // If the active stats member just got filtered out, fall back to the first
  // visible one so the chart isn't blank.
  if (visibleMembers.indexOf(statsMember) === -1) {
    statsMember = visibleMembers[0] || '';
  }
  var strip = document.getElementById('stats-member-strip');
  strip.innerHTML = '';
  visibleMembers.forEach(function(m, idx) {
    var chip = document.createElement('span');
    chip.className = 'm-chip' + (m === statsMember ? ' active' : '');
    chip.textContent = m;
    chip.onclick = function() { statsSelectMember(visibleMembers[idx]); };
    strip.appendChild(chip);
  });

  // Week label
  var weekData = buildWeekData(statsMember, statsWeekOffset);
  var label = weekData.label;
  document.getElementById('stats-week-label').textContent = label;

  // M2: weekly rule-based insight card (renders between week nav and chart)
  renderInsightCard(weekData);
  // B2: Gemini weekly coach card (shows cached report if present, or a
  // "產生本週報告" button that calls Gemini once per week).
  renderCoachCard(weekData);

  // Pick a default selected day for the detail section:
  //   1. Today (if today is in this week)
  //   2. Otherwise, the latest day with any data
  //   3. Otherwise, null (hide detail section entirely)
  if (statsSelectedDayIdx === null ||
      statsSelectedDayIdx < 0 ||
      statsSelectedDayIdx > 6) {
    statsSelectedDayIdx = defaultDayIdxForWeek(weekData);
  }

  // Chart (now aware of which day is highlighted)
  document.getElementById('stats-chart').innerHTML = renderWeeklySvgChart(weekData, statsSelectedDayIdx);

  // Daily detail (3 meal cards for the selected day)
  renderDailyDetail(weekData, statsSelectedDayIdx);

  // Averages — only counts days with actual intake, so a half-logged week
  // still shows a representative "per-day" figure instead of /7.
  var days = weekData.days;
  var count = days.filter(function(d) { return d.carb + d.pro + d.fat > 0; }).length || 1;
  var avgCarb = Math.round(days.reduce(function(s,d){return s+d.carb;},0) / count);
  var avgPro  = Math.round(days.reduce(function(s,d){return s+d.pro;},0)  / count);
  var avgFat  = Math.round(days.reduce(function(s,d){return s+d.fat;},0)  / count);
  var avgKcal = Math.round(days.reduce(function(s,d){return s+d.kcal;},0) / count);

  // Compare average kcal to this member's TDEE (if profile is complete).
  // Within ±10% → 綠 達標, above → 紅 偏高, below → 橘 偏低
  // Prefer the cross-device profiles map so a stats viewer who isn't the
  // profile owner still sees the target (e.g., shunyu1123 viewing Dean).
  var profileData = localProfiles[statsMember]
                 || safeParse('profile::' + statsMember, {}, '個人資料')
                 || {};
  var tdeeInfo = computeTdee(profileData);
  var kcalExtra = '';
  var kcalStatClass = 'kcal-c';
  if (tdeeInfo && tdeeInfo.tdee > 0 && avgKcal > 0) {
    var diff = avgKcal - tdeeInfo.tdee;
    var pct = diff / tdeeInfo.tdee;
    var status, cls;
    if (Math.abs(pct) <= 0.10) { status = '達標'; cls = 'kcal-ok'; }
    else if (pct > 0.10)       { status = '偏高'; cls = 'kcal-high'; }
    else                       { status = '偏低'; cls = 'kcal-low'; }
    kcalStatClass = cls;
    var sign = diff >= 0 ? '+' : '−';
    kcalExtra = '<div class="kcal-target-line">目標 ' + tdeeInfo.tdee + ' 大卡 · '
      + '<span class="kcal-status ' + cls + '">' + status + ' ' + sign + Math.abs(diff) + '</span></div>';
  } else {
    kcalExtra = '<div class="kcal-target-line muted">填寫個人資料可顯示每日目標</div>';
  }

  document.getElementById('stats-avg-row').innerHTML =
    '<div class="sum-card sum-card-wide">'
    +   '<div class="s-label">平均熱量</div>'
    +   '<div class="s-val ' + kcalStatClass + '">' + avgKcal + '</div>'
    +   '<div class="s-unit">大卡/天</div>'
    +   kcalExtra
    + '</div>' +
    '<div class="sum-card"><div class="s-label">平均碳水</div><div class="s-val carb-c">' + avgCarb + '</div><div class="s-unit">克/天</div></div>' +
    '<div class="sum-card"><div class="s-label">平均蛋白</div><div class="s-val pro-c">'  + avgPro  + '</div><div class="s-unit">克/天</div></div>' +
    '<div class="sum-card"><div class="s-label">平均脂肪</div><div class="s-val fat-c">'  + avgFat  + '</div><div class="s-unit">克/天</div></div>';
}

// ─── M2: Weekly insight card ─────────────────────────────────────
// Rule-based analyzer that reads the current week's days + the member's
// TDEE target (if complete) and produces 2-4 plain-language bullets.
// No AI calls here — purely arithmetic for reliability and zero cost.
function buildInsights(weekData, tdeeInfo) {
  var days = weekData.days || [];
  var loggedDays = days.filter(function(d) { return d.kcal > 0; });
  var out = [];
  if (loggedDays.length === 0) return out;

  // 1) Logging consistency
  if (loggedDays.length < 7) {
    out.push({ sent: 'warn', text: '本週有 ' + (7 - loggedDays.length) + ' 天沒有記錄' });
  } else {
    out.push({ sent: 'good', text: '本週七天都有記錄 🎉' });
  }

  // 2) Energy budget vs TDEE target
  if (tdeeInfo && tdeeInfo.tdee > 0) {
    var hi = tdeeInfo.tdee * 1.15;
    var lo = tdeeInfo.tdee * 0.85;
    var over  = loggedDays.filter(function(d) { return d.kcal > hi; }).length;
    var under = loggedDays.filter(function(d) { return d.kcal < lo; }).length;
    if (over >= 3) {
      out.push({ sent: 'bad',  text: '本週有 ' + over + ' 天熱量超標（>' + Math.round(hi) + ' 大卡）' });
    } else if (over > 0) {
      out.push({ sent: 'warn', text: '本週有 ' + over + ' 天熱量偏高' });
    } else if (under >= 3) {
      out.push({ sent: 'warn', text: '本週有 ' + under + ' 天熱量偏低（<' + Math.round(lo) + ' 大卡）' });
    } else {
      out.push({ sent: 'good', text: '熱量控制穩定 ✓' });
    }
  }

  // 3) Peak day
  var peak = loggedDays.slice().sort(function(a, b) { return b.kcal - a.kcal; })[0];
  if (peak && loggedDays.length > 1) {
    out.push({ sent: 'neutral', text: peak.label + ' 吃最多（' + peak.kcal + ' 大卡）' });
  }

  // 4) Protein share check (Atwater: protein contributes 4 kcal/g)
  var totalPro  = days.reduce(function(s, d) { return s + d.pro;  }, 0);
  var totalKcal = days.reduce(function(s, d) { return s + d.kcal; }, 0);
  if (totalKcal > 200) {
    var proPct = (totalPro * 4) / totalKcal;
    if (proPct < 0.10) {
      out.push({ sent: 'warn', text: '蛋白質比例偏低（' + Math.round(proPct * 100) + '%），可加點蛋豆魚肉類' });
    } else if (proPct > 0.35) {
      out.push({ sent: 'warn', text: '蛋白質比例偏高（' + Math.round(proPct * 100) + '%）' });
    }
  }

  return out.slice(0, 4);
}

// ─── B2: Gemini weekly coach ─────────────────────────────────────
function coachCacheKey(member, weekData) {
  // Use the first day of the week (Monday) as the cache key so swapping
  // between adjacent days in the same week reuses the same report.
  var first = weekData && weekData.days && weekData.days[0];
  var weekKey = first ? first.dateStr : new Date().toISOString().slice(0,10);
  return 'coach::' + member + '::' + weekKey;
}

function renderCoachCard(weekData) {
  var card = document.getElementById('stats-coach-card');
  if (!card) return;
  var loggedDays = (weekData.days || []).filter(function(d) { return d.kcal > 0; }).length;
  if (loggedDays === 0) { card.style.display = 'none'; return; }
  card.style.display = '';

  var cacheKey = coachCacheKey(statsMember, weekData);
  var cached = safeParse(cacheKey, null, 'AI 週報');
  if (cached && cached.good) {
    card.innerHTML = buildCoachHtml(cached, true);
  } else {
    card.innerHTML = '<div class="coach-head">'
      + '<span class="coach-title">✨ AI 週報教練</span>'
      + '<button class="coach-btn" onclick="generateCoachReport()">產生本週報告</button>'
      + '</div>'
      + '<div class="coach-empty">讓 Gemini 幫你分析這週吃得怎麼樣，並建議下週菜單</div>';
  }
}

function buildCoachHtml(report, fromCache) {
  var when = report.generatedAt
    ? new Date(report.generatedAt).toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : '';
  var sugList = (report.suggestions || []).map(function(s) {
    return '<div class="coach-sug-item"><span class="coach-sug-name">' + escAttr(s.name || '') + '</span>'
      + (s.reason ? '　' + escAttr(s.reason) : '') + '</div>';
  }).join('');
  return '<div class="coach-head">'
    + '<span class="coach-title">✨ AI 週報教練</span>'
    + '<button class="coach-btn" onclick="generateCoachReport(true)">↻ 重新產生</button>'
    + '</div>'
    + (report.good ? '<div class="coach-section"><div class="coach-section-label">👍 做得好的地方</div><div class="coach-section-body">' + escAttr(report.good) + '</div></div>' : '')
    + (report.improve ? '<div class="coach-section"><div class="coach-section-label">💡 可以改進的地方</div><div class="coach-section-body">' + escAttr(report.improve) + '</div></div>' : '')
    + (sugList ? '<div class="coach-section"><div class="coach-section-label">🍽️ 下週建議菜單</div><div class="coach-sug-list">' + sugList + '</div></div>' : '')
    + (when ? '<div class="coach-timestamp">產生於 ' + when + (fromCache ? '（本週快取）' : '') + '</div>' : '');
}

async function generateCoachReport(forceFresh) {
  var key = getGeminiKey();
  if (!key) {
    var ok = promptForGeminiKey();
    if (!ok) return;
    key = getGeminiKey();
    if (!key) return;
  }
  var weekData = buildWeekData(statsMember, statsWeekOffset);
  var cacheKey = coachCacheKey(statsMember, weekData);
  if (!forceFresh) {
    var existing = safeParse(cacheKey, null, 'AI 週報');
    if (existing && existing.good) {
      renderCoachCard(weekData);
      return;
    }
  }
  var card = document.getElementById('stats-coach-card');
  if (card) {
    card.innerHTML = '<div class="coach-head"><span class="coach-title">✨ AI 週報教練</span>'
      + '<button class="coach-btn" disabled>分析中...</button></div>'
      + '<div class="coach-empty">Gemini 正在閱讀你這週的飲食記錄...</div>';
  }

  // Build a compact textual summary of the week for the prompt
  var lines = [];
  (weekData.days || []).forEach(function(d) {
    var dayKey = statsMember + '::' + d.dateStr;
    var dayData = localData[dayKey] || {};
    var mealLines = [];
    MEALS_DEF.forEach(function(def) {
      var meal = dayData[def.id];
      if (!meal || !hasMealData(meal)) return;
      var names = collectMealItemNames(meal);
      var kcal = mealKcal(meal);
      mealLines.push('  ' + def.name + '（' + kcal + '大卡）：' + (names.length ? names.join('、') : '—'));
    });
    if (mealLines.length > 0) {
      lines.push(d.label + '  [' + d.kcal + ' 大卡  碳' + d.carb + 'g 蛋' + d.pro + 'g 脂' + d.fat + 'g]');
      lines.push(mealLines.join('\n'));
    } else {
      lines.push(d.label + '  (未記錄)');
    }
  });
  var weekSummary = lines.join('\n');

  var profile = localProfiles[statsMember]
             || safeParse('profile::' + statsMember, {}, '個人資料')
             || {};
  var tdeeInfo = computeTdee(profile);
  var profileLine = '';
  if (profile.height && profile.weight) {
    profileLine = '成員資料：' + statsMember
      + '，' + profile.height + 'cm，' + profile.weight + 'kg'
      + (profile.gender === 'male' ? '，男性' : (profile.gender === 'female' ? '，女性' : ''))
      + (tdeeInfo ? '，每日建議熱量 ' + tdeeInfo.tdee + ' 大卡' : '');
  }

  var prompt = '你是一位友善、溫和、說話像家人的台灣營養師。\n\n'
    + profileLine + '\n\n'
    + '以下是最近一週的飲食記錄：\n\n' + weekSummary + '\n\n'
    + '請以繁體中文輸出一份簡短報告，分三個部分：\n'
    + '1. good：「做得好的地方」— 2-3 句，具體指出這週飲食裡值得肯定的點。\n'
    + '2. improve：「可以改進的地方」— 2-3 句，用溫和語氣提醒，不要批判。避免使用「過量」「超標」等嚇人字眼，改用「稍微多了一點」「可以再少一點」。\n'
    + '3. suggestions：「下週建議菜單」— 列出 3 道台灣家常料理，每道包含 name（菜名，例：蒸蛋豆腐）和 reason（為什麼推薦，1 句話，說明對這位成員的好處）。\n\n'
    + '讀者是台灣家庭的長輩，語氣要像孫子跟阿嬤講話那樣親切，不要像醫生下指令。';

  var body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'OBJECT',
        properties: {
          good:    { type: 'STRING' },
          improve: { type: 'STRING' },
          suggestions: {
            type: 'ARRAY',
            items: {
              type: 'OBJECT',
              properties: { name: { type: 'STRING' }, reason: { type: 'STRING' } },
              required: ['name', 'reason']
            }
          }
        },
        required: ['good', 'improve', 'suggestions']
      }
    }
  };

  try {
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL
      + ':generateContent?key=' + encodeURIComponent(key);
    var res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('API ' + res.status + ': ' + (await res.text()).slice(0, 200));
    var data = await res.json();
    var txt = data && data.candidates && data.candidates[0] && data.candidates[0].content
      && data.candidates[0].content.parts && data.candidates[0].content.parts[0]
      && data.candidates[0].content.parts[0].text;
    if (!txt) throw new Error('Gemini 回傳空內容');
    var parsed = JSON.parse(txt);
    parsed.generatedAt = new Date().toISOString();
    try { localStorage.setItem(cacheKey, JSON.stringify(parsed)); } catch(_) {}
    renderCoachCard(weekData);
    toast('AI 週報已產生 ✓');
  } catch (e) {
    console.error('Coach error:', e);
    toast('週報產生失敗：' + (e.message || e));
    renderCoachCard(weekData);
  }
}

function renderInsightCard(weekData) {
  var card = document.getElementById('stats-insight-card');
  if (!card) return;
  var profileData = localProfiles[statsMember]
                 || safeParse('profile::' + statsMember, {}, '個人資料')
                 || {};
  var tdeeInfo = computeTdee(profileData);
  var insights = buildInsights(weekData, tdeeInfo);
  if (insights.length === 0) { card.style.display = 'none'; return; }
  card.style.display = '';
  var items = insights.map(function(ins) {
    var cls = 'insight-item' + (ins.sent && ins.sent !== 'neutral' ? ' ' + ins.sent : '');
    return '<div class="' + cls + '"><span class="dot">●</span><span>' + escAttr(ins.text) + '</span></div>';
  }).join('');
  card.innerHTML = '<div class="insight-head">💡 本週洞察</div>'
    + '<div class="insight-list">' + items + '</div>';
}

function defaultDayIdxForWeek(weekData) {
  if (statsWeekOffset === 0) {
    // Current week: default to today if it has data, else the last day with data, else today anyway
    var now = new Date();
    var day = now.getDay() || 7;
    var todayIdx = day - 1; // 0..6 (Mon..Sun)
    if (weekData.days[todayIdx] && weekData.days[todayIdx].kcal > 0) return todayIdx;
    for (var i = todayIdx; i >= 0; i--) {
      if (weekData.days[i] && weekData.days[i].kcal > 0) return i;
    }
    return todayIdx; // show today even if empty
  }
  // Past weeks: latest day with data, else last day of the week
  for (var j = 6; j >= 0; j--) {
    if (weekData.days[j] && weekData.days[j].kcal > 0) return j;
  }
  return 6;
}

function collectMealItemNames(meal) {
  var names = [];
  if (!meal) return names;
  (meal.dishes || []).forEach(function(d) {
    (d.items || []).forEach(function(it) {
      if (it && it.name && String(it.name).trim()) {
        names.push(String(it.name).trim());
      }
    });
  });
  return names;
}

function mealKcal(meal) {
  var t = computeMealTotals(meal);
  return Math.round((t.carb || 0) * 4 + (t.pro || 0) * 4 + (t.fat || 0) * 9);
}

function renderDailyDetail(weekData, idx) {
  var container = document.getElementById('stats-daily-detail');
  if (!container) return;
  if (idx == null || !weekData.days[idx]) { container.innerHTML = ''; return; }
  var day = weekData.days[idx];
  var dayKey = statsMember + '::' + day.dateStr;
  var dayData = localData[dayKey] || {};

  var cards = MEALS_DEF.map(function(def) {
    var meal = dayData[def.id];
    var names = collectMealItemNames(meal);
    var kcal = mealKcal(meal);
    var note = (meal && meal.note) ? String(meal.note).trim() : '';
    var namesHtml;
    if (names.length) {
      namesHtml = '<div class="smc-items">' + names.map(escAttr).join('、') + '</div>';
    } else {
      namesHtml = '<div class="smc-items empty">—</div>';
    }
    var noteHtml = note ? '<div class="smc-note">備註：' + escAttr(note) + '</div>' : '';
    var kcalStr = kcal > 0 ? (kcal + ' 大卡') : '–';
    return '<div class="stats-meal-card">'
      +   '<div class="smc-head">'
      +     '<span class="smc-icon">' + def.icon + '</span>'
      +     '<span class="smc-name">' + def.name + '</span>'
      +     '<span class="smc-kcal">' + kcalStr + '</span>'
      +   '</div>'
      +   namesHtml
      +   noteHtml
      + '</div>';
  }).join('');

  container.innerHTML =
    '<div class="stats-detail-head">' + escAttr(day.label) + ' 當日明細</div>'
    + cards;
}

function buildWeekData(member, weekOffset) {
  // Find Monday of target week
  var now = new Date();
  var day = now.getDay() || 7; // make Sunday = 7
  var monday = new Date(now);
  monday.setDate(now.getDate() - day + 1 + weekOffset * 7);
  // Use noon local so toISOString().slice(0,10) returns the correct local date
  // in any timezone (otherwise midnight local + UTC+8 = previous UTC day → keys off by one).
  monday.setHours(12,0,0,0);

  var days = [];
  var weekDayNames = ['一','二','三','四','五','六','日'];
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday);
    d.setDate(monday.getDate() + i);
    var dateStr = d.toISOString().slice(0,10);
    // localData keys are "<member>::<yyyy-mm-dd>" (see dateKey())
    var dayData = localData[member + '::' + dateStr] || {};
    var carb = 0, pro = 0, fat = 0;
    Object.keys(dayData).forEach(function(mealId) {
      var meal = dayData[mealId];
      if (!meal) return;
      // Handle both new format (dishes[]) and old format (items[])
      if (meal.dishes && meal.dishes.length) {
        meal.dishes.forEach(function(dish) {
          (dish.items || []).forEach(function(it) {
            carb += parseFloat(it.carb) || 0;
            pro  += parseFloat(it.pro)  || 0;
            fat  += parseFloat(it.fat)  || 0;
          });
        });
      } else if (meal.items && meal.items.length) {
        meal.items.forEach(function(it) {
          carb += parseFloat(it.carb) || 0;
          pro  += parseFloat(it.pro)  || 0;
          fat  += parseFloat(it.fat)  || 0;
        });
      } else {
        // Fallback: use saved totals
        carb += parseFloat(meal.carb) || 0;
        pro  += parseFloat(meal.pro)  || 0;
        fat  += parseFloat(meal.fat)  || 0;
      }
    });
    // Atwater factors: 4 kcal/g carb, 4 kcal/g protein, 9 kcal/g fat.
    var kcal = carb * 4 + pro * 4 + fat * 9;
    days.push({
      idx: i,
      dateStr: dateStr,
      label: (d.getMonth()+1) + '/' + d.getDate() + ' (' + weekDayNames[i] + ')',
      carb: Math.round(carb), pro: Math.round(pro), fat: Math.round(fat),
      kcal: Math.round(kcal)
    });
  }

  var sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  var fmt = function(d) { return (d.getMonth()+1) + '/' + d.getDate(); };
  return {
    label: fmt(monday) + ' – ' + fmt(sunday),
    days: days
  };
}

function renderWeeklySvgChart(weekData, selectedIdx) {
  var days = weekData.days;
  var BAR_W = 220; // max bar width in SVG units
  var ROW_H = 36;
  var LABEL_W = 72;
  var TOTAL_W = 64; // room for "1234 kcal"
  var SVG_W = LABEL_W + BAR_W + TOTAL_W;
  var SVG_H = days.length * ROW_H + 4;

  // Find max total to scale bars
  var maxTotal = 1;
  days.forEach(function(d) {
    var t = d.carb + d.pro + d.fat;
    if (t > maxTotal) maxTotal = t;
  });

  var rows = days.map(function(d, i) {
    var y = i * ROW_H + 2;
    var total = d.carb + d.pro + d.fat;
    var scale = BAR_W / maxTotal;
    var wCarb = Math.round(d.carb * scale);
    var wPro  = Math.round(d.pro  * scale);
    var wFat  = Math.round(d.fat  * scale);
    var xPro  = LABEL_W + wCarb;
    var xFat  = xPro + wPro;
    var barH = 18;
    var barY = y + (ROW_H - barH) / 2;
    // Show kcal (meaningful energy intake) instead of gram sum (meaningless).
    var totalStr = d.kcal > 0 ? d.kcal + ' 大卡' : '–';
    var isSelected = (i === selectedIdx);
    // Pale-blue highlight stripe behind the selected row so users can tell
    // which day the detail section below corresponds to.
    var hi = isSelected
      ? '<rect x="0" y="' + y + '" width="' + SVG_W + '" height="' + (ROW_H - 2) + '" rx="6" fill="#E8F1FF"/>'
      : '';
    return [
      '<g onclick="statsSelectDay(' + i + ')" style="cursor:pointer;">',
      hi,
      '<text x="' + (LABEL_W - 6) + '" y="' + (barY + 13) + '" text-anchor="end" font-size="11" fill="' + (isSelected ? '#2563EB' : '#9A9890') + '">' + d.label + '</text>',
      total > 0 ? [
        '<rect x="' + LABEL_W + '" y="' + barY + '" width="' + wCarb + '" height="' + barH + '" rx="3" fill="#D85A30"/>',
        '<rect x="' + xPro  + '" y="' + barY + '" width="' + wPro  + '" height="' + barH + '" rx="0" fill="#1D9E75"/>',
        '<rect x="' + xFat  + '" y="' + barY + '" width="' + wFat  + '" height="' + barH + '" rx="0" fill="#BA7517"/>',
      ].join('') : '<rect x="' + LABEL_W + '" y="' + (barY+7) + '" width="' + BAR_W + '" height="4" rx="2" fill="#E0DED6"/>',
      '<text x="' + (LABEL_W + BAR_W + 4) + '" y="' + (barY + 13) + '" font-size="10" fill="#5F5E5A">' + totalStr + '</text>',
      // Transparent overlay spanning the full row so taps on empty space still select the day.
      '<rect x="0" y="' + y + '" width="' + SVG_W + '" height="' + (ROW_H - 2) + '" fill="transparent"/>',
      '</g>'
    ].join('');
  });

  return '<svg viewBox="0 0 ' + SVG_W + ' ' + SVG_H + '" xmlns="http://www.w3.org/2000/svg">'
    + rows.join('')
    + '</svg>';
}
</script>
